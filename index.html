<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypto Dashboard</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="data:,">
</head>

<body>

<!-- MENU BUTTON -->
<button class="menu-btn" onclick="toggleSidebar()">☰</button>

<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <h2>Crypto Panel</h2>

    <button onclick="showSection('search')">Search</button>
    <button onclick="showSection('portfolio')">Portfolio</button>
    <button onclick="showSection('market')">Market</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <!-- SEARCH VIEW -->
    <div id="search" class="section">

      <h1>Crypto Price Dashboard</h1>

      <!-- SEARCH -->
      <div class="search-box">
        <input id="coin" placeholder="bitcoin / ethereum">
        <button onclick="getPrice()">Search</button>
      </div>

      <!-- PRICE INFO -->
      <div class="price-row">
        <span id="coinName"></span>
        <span>Currency:</span>
        <span id="priceValue"></span>

        <span class="currency-wrap">
          <select id="currencySelect">
            <option value="usd">USD</option>
            <option value="myr">MYR</option>
            <option value="eur">EUR</option>
          </select>
        </span>
      </div>

      <div id="currencyBadge" class="currencyBadge"></div>

      <div id="result" class="result-box"></div>

      <!-- MAIN CHART CARD -->
      <div class="chart-container main-chart">
        <canvas id="chart"></canvas>
        <div id="annotationText"></div>
      </div>

      <button onclick="resetZoom()" style="margin-top:8px;">
        Reset zoom
      </button>

      <!-- INDICATOR CHART CARD -->
      <h2>Technical Indicators</h2>
      <div class="chart-container indicator-chart">
        <canvas id="indicatorChart"></canvas>
      </div>

    </div>

    <!-- PORTFOLIO VIEW -->
    <div id="portfolio" class="section hidden">

      <div>
        <h1>My Portfolio</h1>

        <input id="pCoin" placeholder="coin (bitcoin)">
        <input id="pAmount" placeholder="amount">
        <input id="pBuyPrice" placeholder="buy price (per coin in USD)">
      </div>

      <div class="currency-panel">
        <span>Currency:</span>
        <select id="portfolioCurrencySelect">
          <option value="usd">USD</option>
          <option value="myr">MYR</option>
          <option value="eur">EUR</option>
        </select>
      </div>

      <button onclick="addAsset()">Add</button>
      <button onclick="clearPortfolio()">Clear Portfolio</button>

      <div id="portfolioList"></div>

    </div>

    <div id="market" class="section hidden">
      <h1>Market Overview</h1>
      <div class="market-grid">
    <!-- LEFT -->
      <div class="market-content">
        <div class="status-bar">
          <div id="marketSentiment"></div>
          <div id="lastUpdated"></div>
        </div>
        <div class="market-box">
          <h3>Stats</h3>
          <div id="globalMarket" class="stats-grid"></div>
        </div>

        <div class="market-box">
          <h3>Market Movers</h3>
          <div id="marketMovers"></div>
        </div>

        <div id="marketSentiment" class="sentiment"></div>
      </div>

    <!-- RIGHT -->
      <div class="market-box">
        <h3>Top Coins</h3>
        <div id="topCoins"></div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
  <div class="modal-box" id="modalText"></div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@1.2.1/dist/chartjs-plugin-zoom.min.js"></script>
<script src="app.js"></script>

</body>
</html>
